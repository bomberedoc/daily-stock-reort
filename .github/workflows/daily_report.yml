name: Daily Stock Report

on:
  schedule:
    # 04:30 UTC == 10:00 IST daily
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  send_report:
    runs-on: ubuntu-latest
    env:
      API_KEY: ${{ secrets.API_KEY }}
      MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}
      MAILGUN_FROM: ${{ secrets.MAILGUN_FROM }}
      MAILGUN_TO: ${{ secrets.MAILGUN_TO }}
      # Optional Twilio/WhatsApp secrets (set these if you want WhatsApp delivery)
      # accept either naming convention for Twilio secrets (TWILIO_ACCOUNT_SID / TWILIO_SID)
      TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID || secrets.TWILIO_SID }}
      TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN || secrets.TWILIO_TOKEN }}
      WHATSAPP_FROM: ${{ secrets.WHATSAPP_FROM }}
      WHATSAPP_TO: ${{ secrets.WHATSAPP_TO }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily stock report
        run: python send_email.py
